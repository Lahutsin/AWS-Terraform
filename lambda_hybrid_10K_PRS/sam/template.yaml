AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Real SAM deployment template for the hybrid Lambda architecture.

Parameters:
  Environment:
    Type: String
    Default: dev
  ProjectName:
    Type: String
    Default: lambda-hybrid
  SyncRoutePath:
    Type: String
    Default: /sync
  AsyncRoutePath:
    Type: String
    Default: /async
  LogRetentionInDays:
    Type: Number
    Default: 14
  SyncMemorySize:
    Type: Number
    Default: 512
  SyncTimeout:
    Type: Number
    Default: 10
  WorkerMemorySize:
    Type: Number
    Default: 512
  WorkerTimeout:
    Type: Number
    Default: 30
  WorkerBatchSize:
    Type: Number
    Default: 10
  QueueVisibilityTimeout:
    Type: Number
    Default: 180
  QueueMaxReceiveCount:
    Type: Number
    Default: 5

Globals:
  Function:
    Runtime: python3.12
    Tracing: Active
    Architectures:
      - arm64
    Environment:
      Variables:
        REQUESTS_TABLE: !Ref RequestsTable
        PAYLOAD_BUCKET: !Ref PayloadBucket

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: v1

  PayloadBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  RequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  AsyncDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${Environment}-dlq

  AsyncQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${Environment}-async
      VisibilityTimeout: !Ref QueueVisibilityTimeout
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AsyncDeadLetterQueue.Arn
        maxReceiveCount: !Ref QueueMaxReceiveCount

  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-${Environment}-sync
      CodeUri: ../src/
      Handler: sync_handler.handler
      MemorySize: !Ref SyncMemorySize
      Timeout: !Ref SyncTimeout
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref PayloadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref RequestsTable
      Events:
        SyncRequest:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: !Ref SyncRoutePath
            Method: POST

  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-${Environment}-worker
      CodeUri: ../src/
      Handler: worker_handler.handler
      MemorySize: !Ref WorkerMemorySize
      Timeout: !Ref WorkerTimeout
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref PayloadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref RequestsTable
        - SQSPollerPolicy:
            QueueName: !GetAtt AsyncQueue.QueueName
      Events:
        AsyncQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt AsyncQueue.Arn
            BatchSize: !Ref WorkerBatchSize
            FunctionResponseTypes:
              - ReportBatchItemFailures

  ApiGatewayToSqsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SendMessageToAsyncQueue
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt AsyncQueue.Arn

  AsyncQueueIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      CredentialsArn: !GetAtt ApiGatewayToSqsRole.Arn
      Description: Send API requests to SQS for async processing
      IntegrationSubtype: SQS-SendMessage
      IntegrationType: AWS_PROXY
      PayloadFormatVersion: '1.0'
      RequestParameters:
        MessageBody: $request.body
        QueueUrl: !Ref AsyncQueue

  AsyncQueueRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: !Sub POST ${AsyncRoutePath}
      Target: !Sub integrations/${AsyncQueueIntegration}

  SyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-${Environment}-sync
      RetentionInDays: !Ref LogRetentionInDays

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-${Environment}-worker
      RetentionInDays: !Ref LogRetentionInDays

Outputs:
  HttpApiUrl:
    Description: Base URL of the SAM-deployed HTTP API.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/v1
  SyncInvokeUrl:
    Description: Sync route URL.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/v1${SyncRoutePath}
  AsyncInvokeUrl:
    Description: Async route URL.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/v1${AsyncRoutePath}
  AsyncQueueUrl:
    Description: Async queue URL.
    Value: !Ref AsyncQueue
